openapi: 3.0.3
info:
  title: Habesha Event Management API
  description: |
    Complete API documentation for the Habesha Event Management System.
    This API handles authentication, bookings, events, payments, gallery, services, and admin operations.
  version: 1.0.0
  contact:
    name: API Support
    email: support@habesha-events.com

servers:
  - url: http://localhost/api
    description: Local development server
  - url: https://api.habesha-events.com/api
    description: Production server

tags:
  - name: Authentication
    description: User authentication and account management
  - name: Bookings
    description: Event booking management
  - name: Events
    description: Event management and ticket purchasing
  - name: Services
    description: Service catalog management
  - name: Gallery
    description: Gallery and photo management
  - name: Payments
    description: Payment processing and verification
  - name: Users
    description: User profile and account management
  - name: Dashboard
    description: Dashboard metrics and statistics
  - name: Reports
    description: Admin reports and analytics
  - name: Admin Config
    description: Admin configuration for pricing and payment methods
  - name: Notifications
    description: Admin notification management

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT token obtained from login/register endpoints

  schemas:

    # ─── Standard Response Wrapper ───────────────────────────────────────────────
    SuccessResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        message:
          type: string
          example: Operation successful
        data:
          type: object

    ErrorResponse:
      type: object
      properties:
        success:
          type: boolean
          example: false
        message:
          type: string
          example: An error occurred
        errors:
          type: array
          items:
            type: object
            properties:
              field:
                type: string
              message:
                type: string

    # ─── User ────────────────────────────────────────────────────────────────────
    User:
      type: object
      properties:
        id:
          type: integer
          example: 1
        firstName:
          type: string
          example: Abebe
        lastName:
          type: string
          example: Kebede
        email:
          type: string
          format: email
          example: abebe@example.com
        phone:
          type: string
          example: "0911223344"
        role:
          type: string
          enum: [user, admin]
          example: user
        status:
          type: string
          enum: [active, inactive, pending, suspended]
          example: active
        profileImage:
          type: string
          nullable: true
          example: /uploads/profiles/user1.jpg
        emailVerified:
          type: boolean
          example: false
        twoFactorEnabled:
          type: boolean
          example: false
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    # ─── Booking ─────────────────────────────────────────────────────────────────
    Booking:
      type: object
      properties:
        id:
          type: integer
          example: 1
        userId:
          type: integer
          example: 1
        customerName:
          type: string
          example: Abebe Kebede
        customerEmail:
          type: string
          format: email
          example: abebe@example.com
        customerPhone:
          type: string
          example: "0911223344"
        eventType:
          type: string
          enum: [wedding, birthday, corporate, other]
          example: wedding
        eventDate:
          type: string
          format: date
          example: "2026-06-15"
        eventTime:
          type: string
          example: "14:00"
        guestCount:
          type: integer
          example: 150
        durationHours:
          type: integer
          example: 5
        message:
          type: string
          nullable: true
          example: Please arrange floral decorations
        status:
          type: string
          enum: [pending, confirmed, cancelled, completed]
          example: pending
        totalPrice:
          type: number
          format: float
          example: 25000.00
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    # ─── Event ───────────────────────────────────────────────────────────────────
    Event:
      type: object
      properties:
        id:
          type: integer
          example: 1
        title:
          type: string
          example: Ethiopian New Year Celebration
        description:
          type: string
          nullable: true
          example: Join us for a grand celebration
        eventType:
          type: string
          example: cultural
        location:
          type: string
          nullable: true
          example: Addis Ababa, Ethiopia
        latitude:
          type: number
          format: float
          nullable: true
          example: 9.0192
        longitude:
          type: number
          format: float
          nullable: true
          example: 38.7525
        eventDate:
          type: string
          format: date
          example: "2026-09-11"
        eventTime:
          type: string
          example: "18:00"
        ticketPrice:
          type: number
          format: float
          example: 500.00
        totalTickets:
          type: integer
          nullable: true
          example: 200
        remainingTickets:
          type: integer
          nullable: true
          example: 150
        imageUrl:
          type: string
          nullable: true
          example: /uploads/events/event1.jpg
        status:
          type: string
          enum: [active, inactive, cancelled]
          example: active
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    # ─── Service ─────────────────────────────────────────────────────────────────
    Service:
      type: object
      properties:
        id:
          type: integer
          example: 1
        name:
          type: string
          example: Wedding Photography
        description:
          type: string
          nullable: true
          example: Professional wedding photography service
        price:
          type: number
          format: float
          example: 15000.00
        category:
          type: string
          example: photography
        status:
          type: string
          enum: [active, inactive]
          example: active
        featured:
          type: boolean
          example: true
        images:
          type: array
          items:
            type: string
          example: ["/uploads/services/img1.jpg", "/uploads/services/img2.jpg"]
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    # ─── Gallery ─────────────────────────────────────────────────────────────────
    GalleryItem:
      type: object
      properties:
        id:
          type: integer
          example: 1
        title:
          type: string
          example: Wedding at Sheraton
        description:
          type: string
          nullable: true
          example: Beautiful wedding ceremony
        category:
          type: string
          example: wedding
        location:
          type: string
          nullable: true
          example: Sheraton Addis
        date:
          type: string
          format: date
          nullable: true
          example: "2026-03-20"
        imageUrl:
          type: string
          example: /uploads/gallery/photo1.jpg
        reactions:
          type: object
          additionalProperties:
            type: integer
          example: {"like": 12, "love": 5}
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    # ─── Payment ─────────────────────────────────────────────────────────────────
    Payment:
      type: object
      properties:
        id:
          type: integer
          example: 1
        userId:
          type: integer
          example: 1
        bookingId:
          type: integer
          nullable: true
          example: 1
        eventId:
          type: integer
          nullable: true
          example: null
        amount:
          type: number
          format: float
          example: 25000.00
        method:
          type: string
          enum: [telebirr, cbe, commercial, abyssinia]
          example: telebirr
        status:
          type: string
          enum: [pending, approved, rejected]
          example: pending
        proofUrl:
          type: string
          nullable: true
          example: /uploads/proofs/proof1.jpg
        transactionId:
          type: string
          nullable: true
          example: TXN123456
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    # ─── Pricing Rule ─────────────────────────────────────────────────────────────
    PricingRule:
      type: object
      properties:
        eventType:
          type: string
          enum: [wedding, birthday, corporate, other]
          example: wedding
        basePrice:
          type: number
          format: float
          example: 10000.00
        perGuest:
          type: number
          format: float
          example: 50.00
        perHour:
          type: number
          format: float
          example: 500.00
        defaultHours:
          type: integer
          example: 5

    # ─── Payment Method Config ────────────────────────────────────────────────────
    PaymentMethodConfig:
      type: object
      properties:
        method:
          type: string
          enum: [telebirr, cbe, commercial, abyssinia]
          example: telebirr
        receiverName:
          type: string
          example: Habesha Events
        receiverPhone:
          type: string
          example: "0911000000"
        receiverAccountNumber:
          type: string
          example: "1000123456789"
        note:
          type: string
          nullable: true
          example: Please include your booking ID in the reference
        active:
          type: boolean
          example: true

    # ─── Notification ─────────────────────────────────────────────────────────────
    Notification:
      type: object
      properties:
        id:
          type: integer
          example: 1
        title:
          type: string
          example: New Booking Received
        message:
          type: string
          example: A new booking has been submitted by Abebe Kebede
        type:
          type: string
          example: booking
        isRead:
          type: boolean
          example: false
        createdAt:
          type: string
          format: date-time

    # ─── Payment Initiation Response ─────────────────────────────────────────────
    PaymentInitResponse:
      type: object
      properties:
        payment:
          $ref: '#/components/schemas/Payment'
        receiver:
          type: object
          properties:
            receiverName:
              type: string
              example: Habesha Events
            receiverPhone:
              type: string
              example: "0911000000"
            receiverAccountNumber:
              type: string
              example: "1000123456789"
            note:
              type: string
              nullable: true
        instructions:
          type: object
          properties:
            title:
              type: string
              example: How to pay via Telebirr
            steps:
              type: array
              items:
                type: string
              example:
                - Open your Telebirr app
                - Send to the number above
                - Take a screenshot of the confirmation
                - Upload the screenshot below
            note:
              type: string
              nullable: true
              example: Payment must be completed within 24 hours


paths:
  # ═══════════════════════════════════════════════════════════════════════════════
  # AUTHENTICATION
  # ═══════════════════════════════════════════════════════════════════════════════
  
  /auth/register:
    post:
      tags:
        - Authentication
      summary: Register a new user
      description: Create a new user account and receive JWT token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - firstName
                - lastName
                - email
                - phone
                - password
              properties:
                firstName:
                  type: string
                  example: Abebe
                lastName:
                  type: string
                  example: Kebede
                email:
                  type: string
                  format: email
                  example: abebe@example.com
                phone:
                  type: string
                  example: "0911223344"
                password:
                  type: string
                  format: password
                  minLength: 8
                  example: SecurePass123
      responses:
        '200':
          description: Registration successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: Registration successful
                  data:
                    type: object
                    properties:
                      accessToken:
                        type: string
                        example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
                      user:
                        $ref: '#/components/schemas/User'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /auth/login:
    post:
      tags:
        - Authentication
      summary: Login user
      description: Authenticate user and receive JWT token. Returns 2FA challenge if enabled.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - identifier
                - password
              properties:
                identifier:
                  type: string
                  description: Email or phone number
                  example: abebe@example.com
                password:
                  type: string
                  format: password
                  example: SecurePass123
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: Login successful
                  data:
                    type: object
                    properties:
                      accessToken:
                        type: string
                        example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
                      user:
                        $ref: '#/components/schemas/User'
        '202':
          description: 2FA required
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: false
                  data:
                    type: object
                    properties:
                      twoFactorRequired:
                        type: boolean
                        example: true
                      twoFactorToken:
                        type: string
                        example: temp_token_for_2fa_verification
        '401':
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /auth/2fa/verify:
    post:
      tags:
        - Authentication
      summary: Verify 2FA OTP
      description: Complete login by verifying 2FA OTP code
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - twoFactorToken
                - otp
              properties:
                twoFactorToken:
                  type: string
                  example: temp_token_for_2fa_verification
                otp:
                  type: string
                  example: "123456"
      responses:
        '200':
          description: 2FA verification successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      accessToken:
                        type: string
                      user:
                        $ref: '#/components/schemas/User'
        '401':
          description: Invalid OTP
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /auth/2fa/enable:
    post:
      tags:
        - Authentication
      summary: Enable 2FA
      description: Enable two-factor authentication for the current user
      security:
        - BearerAuth: []
      responses:
        '200':
          description: 2FA enabled successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: Two-factor authentication enabled
                  data:
                    type: object
                    properties:
                      qrCode:
                        type: string
                        description: Base64 encoded QR code image
                      secret:
                        type: string
                        example: JBSWY3DPEHPK3PXP

  /auth/2fa/disable:
    post:
      tags:
        - Authentication
      summary: Disable 2FA
      description: Disable two-factor authentication for the current user
      security:
        - BearerAuth: []
      responses:
        '200':
          description: 2FA disabled successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'

  /auth/change-password:
    post:
      tags:
        - Authentication
      summary: Change password
      description: Change the current user's password
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - currentPassword
                - newPassword
              properties:
                currentPassword:
                  type: string
                  format: password
                  example: OldPass123
                newPassword:
                  type: string
                  format: password
                  minLength: 8
                  example: NewSecurePass456
      responses:
        '200':
          description: Password changed successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '401':
          description: Current password is incorrect
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /auth/resend-verification:
    post:
      tags:
        - Authentication
      summary: Resend email verification
      description: Resend email verification link to the current user
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Verification email sent
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'

  /auth/verify-email:
    get:
      tags:
        - Authentication
      summary: Verify email address
      description: Verify user's email address using token from email
      parameters:
        - name: token
          in: query
          required: true
          schema:
            type: string
          description: Email verification token
      responses:
        '200':
          description: Email verified successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '400':
          description: Invalid or expired token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'


  # ═══════════════════════════════════════════════════════════════════════════════
  # USERS
  # ═══════════════════════════════════════════════════════════════════════════════

  /users/me:
    get:
      tags:
        - Users
      summary: Get current user
      description: Get the currently authenticated user's full profile
      security:
        - BearerAuth: []
      responses:
        '200':
          description: User profile retrieved
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    $ref: '#/components/schemas/User'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    put:
      tags:
        - Users
      summary: Update current user profile
      description: Update the currently authenticated user's profile data
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                firstName:
                  type: string
                  example: Abebe
                lastName:
                  type: string
                  example: Kebede
                phone:
                  type: string
                  example: "0911223344"
      responses:
        '200':
          description: Profile updated successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    $ref: '#/components/schemas/User'

  /users/me/profile-image-upload:
    put:
      tags:
        - Users
      summary: Upload profile image
      description: Upload a new profile picture for the current user
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - profileImage
              properties:
                profileImage:
                  type: string
                  format: binary
                  description: Profile image file (JPEG, PNG, max 5MB)
      responses:
        '200':
          description: Profile image uploaded successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      profileImage:
                        type: string
                        example: /uploads/profiles/user1.jpg

  /users/profile:
    get:
      tags:
        - Users
      summary: Get user profile
      description: Alias for GET /users/me
      security:
        - BearerAuth: []
      responses:
        '200':
          description: User profile retrieved
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    $ref: '#/components/schemas/User'
    put:
      tags:
        - Users
      summary: Update user profile
      description: Alias for PUT /users/me
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                firstName:
                  type: string
                lastName:
                  type: string
                phone:
                  type: string
      responses:
        '200':
          description: Profile updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    $ref: '#/components/schemas/User'

  /users/change-password:
    put:
      tags:
        - Users
      summary: Change password (user route)
      description: Change password via user profile settings
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - currentPassword
                - newPassword
              properties:
                currentPassword:
                  type: string
                  format: password
                newPassword:
                  type: string
                  format: password
                  minLength: 8
      responses:
        '200':
          description: Password changed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'

  /users/deactivate:
    put:
      tags:
        - Users
      summary: Deactivate account
      description: Deactivate the current user's account
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Account deactivated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'

  /users/admin/users:
    get:
      tags:
        - Users
      summary: List all users (Admin)
      description: Get paginated list of all users. Admin only.
      security:
        - BearerAuth: []
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
            example: 200
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
        - name: role
          in: query
          schema:
            type: string
            enum: [user, admin]
        - name: status
          in: query
          schema:
            type: string
            enum: [active, inactive, pending, suspended]
        - name: search
          in: query
          schema:
            type: string
      responses:
        '200':
          description: Users list retrieved
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      users:
                        type: array
                        items:
                          $ref: '#/components/schemas/User'
                      total:
                        type: integer
                        example: 50

  /users/admin/users/{id}:
    put:
      tags:
        - Users
      summary: Update user status (Admin)
      description: Update a user's status or role. Admin only.
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
          example: 1
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                status:
                  type: string
                  enum: [active, inactive, pending, suspended]
                  example: inactive
                role:
                  type: string
                  enum: [user, admin]
      responses:
        '200':
          description: User updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    $ref: '#/components/schemas/User'


  # ═══════════════════════════════════════════════════════════════════════════════
  # BOOKINGS
  # ═══════════════════════════════════════════════════════════════════════════════

  /bookings/calc-price:
    post:
      tags:
        - Bookings
      summary: Calculate booking price
      description: Calculate the total price for a booking before creating it
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - eventType
                - guestCount
                - durationHours
                - eventDate
                - eventTime
              properties:
                eventType:
                  type: string
                  enum: [wedding, birthday, corporate, other]
                  example: wedding
                guestCount:
                  type: integer
                  example: 150
                durationHours:
                  type: integer
                  example: 5
                eventDate:
                  type: string
                  format: date
                  example: "2026-06-15"
                eventTime:
                  type: string
                  example: "14:00"
      responses:
        '200':
          description: Price calculated
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      totalPrice:
                        type: number
                        example: 25000.00
                      basePrice:
                        type: number
